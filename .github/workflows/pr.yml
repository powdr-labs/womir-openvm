name: PR Check

on:
  workflow_dispatch:
  pull_request:
  merge_group:
  push:
    branches:
      - main

# cancel any previous running workflows for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build-and-test:
    name: Build and Test
    runs-on: warp-ubuntu-2404-x64-16x

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install test dependencies
        run: sudo apt-get update && sudo apt-get install -y wabt

      - name: Build project
        run: cargo build --release

      - name: Install Rust toolchain 1.91.0 (stable)
        run: |
          rustup install 1.91.0
          rustup +1.91.0 component add clippy
          rustup +1.91.0 component add rustfmt
          rustup +1.91.0 component add rust-src

      - name: Install WebAssembly target
        run: rustup target add wasm32-unknown-unknown

      - name: Run tests
        run: cargo test --release

  clippy:
    name: Clippy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install test dependencies
        run: sudo apt-get update && sudo apt-get install -y wabt

      - name: Install Rust toolchain 1.91.0 (stable)
        run: |
          rustup install 1.91.0
          rustup +1.91.0 component add clippy
          rustup +1.91.0 component add rustfmt
          rustup +1.91.0 component add rust-src

      - name: Run Clippy
        run: cargo clippy --all-targets -- -D warnings

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check formatting
        run: cargo fmt --all -- --check

  gpu-tests:
    name: GPU Tests
    runs-on: [self-hosted, gpu-womir]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check GPU memory
        run: |
          FREE_MB=$(nvidia-smi --query-gpu=memory.free --format=csv,noheader,nounits)
          echo "Free GPU memory: ${FREE_MB} MiB"
          if [ "$FREE_MB" -lt 16000 ]; then
            echo "ERROR: Less than 16GB GPU memory free. Check for other GPU processes:"
            nvidia-smi
            exit 1
          fi

      - name: Run GPU ALU tests
        run: |
          cargo test --release --features cuda -- tests::isolated_tests::tests::test_add --exact --test-threads=1
          cargo test --release --features cuda -- tests::isolated_tests::tests::test_sub --exact --test-threads=1
          cargo test --release --features cuda -- tests::isolated_tests::tests::test_xor --exact --test-threads=1
          cargo test --release --features cuda -- tests::isolated_tests::tests::test_or --exact --test-threads=1
          cargo test --release --features cuda -- tests::isolated_tests::tests::test_and --exact --test-threads=1
          cargo test --release --features cuda -- tests::isolated_tests::tests::test_shl --exact --test-threads=1
          cargo test --release --features cuda -- tests::isolated_tests::tests::test_shr_u --exact --test-threads=1
          cargo test --release --features cuda -- tests::isolated_tests::tests::test_shr_s_imm --exact --test-threads=1
          cargo test --release --features cuda -- tests::isolated_tests::tests::test_mul --exact --test-threads=1
          cargo test --release --features cuda -- tests::isolated_tests::tests::test_div --exact --test-threads=1
          cargo test --release --features cuda -- tests::isolated_tests::tests::test_divu --exact --test-threads=1
          cargo test --release --features cuda -- tests::isolated_tests::tests::test_rems --exact --test-threads=1
          cargo test --release --features cuda -- tests::isolated_tests::tests::test_remu --exact --test-threads=1
          cargo test --release --features cuda -- tests::isolated_tests::tests::test_loadw --exact --test-threads=1
          cargo test --release --features cuda -- tests::isolated_tests::tests::test_storew --exact --test-threads=1
          cargo test --release --features cuda -- tests::isolated_tests::tests::test_loadb --exact --test-threads=1
          cargo test --release --features cuda -- tests::isolated_tests::tests::test_loadh --exact --test-threads=1
          cargo test --release --features cuda -- tests::isolated_tests::tests::test_storeb --exact --test-threads=1
          cargo test --release --features cuda -- tests::isolated_tests::tests::test_storeh --exact --test-threads=1
          cargo test --release --features cuda -- tests::isolated_tests::tests::test_const32_small --exact --test-threads=1
          cargo test --release --features cuda -- tests::isolated_tests::tests::test_const32_large --exact --test-threads=1
          cargo test --release --features cuda -- tests::isolated_tests::tests::test_const32_zero --exact --test-threads=1
          cargo test --release --features cuda -- tests::isolated_tests::tests::test_const32_max --exact --test-threads=1
