name: Nightly Benchmark

on:
  schedule:
    - cron: '0 2 * * *' # 2 AM UTC daily
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  benchmark:
    name: Benchmark (${{ matrix.backend }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: cpu
            runner: warp-ubuntu-2404-x64-16x
            cuda_flag: ""
            cargo_features: ""
          - backend: gpu
            runner: [self-hosted, gpu-shared]
            cuda_flag: "--cuda"
            cargo_features: "--features cuda"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}

      - name: Install system dependencies
        if: matrix.backend == 'cpu'
        run: sudo apt-get update && sudo apt-get install -y wabt

      - name: Install Rust toolchain 1.91.0 (stable)
        run: |
          rustup install 1.91.0
          rustup +1.91.0 component add rust-src

      - name: Install WebAssembly target
        run: rustup target add wasm32-unknown-unknown

      - name: Check GPU memory
        if: matrix.backend == 'gpu'
        run: |
          FREE_MB=$(nvidia-smi --query-gpu=memory.free --format=csv,noheader,nounits)
          echo "Free GPU memory: ${FREE_MB} MiB"
          if [ "$FREE_MB" -lt 16000 ]; then
            echo "ERROR: Less than 16GB GPU memory free. Check for other GPU processes:"
            nvidia-smi
            exit 1
          fi

      - name: Build project
        run: cargo build --release ${{ matrix.cargo_features }}

      - name: Build keccak WASM target
        run: |
          cd sample-programs/keccak_with_inputs
          cargo build --release --target wasm32-unknown-unknown

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run keccak benchmarks
        run: bash scripts/run_guest_benches.sh ${{ matrix.cuda_flag }}

      - name: Clone openvm-reth-benchmark
        if: matrix.backend == 'gpu'
        run: |
          rm -rf /tmp/openvm-reth-benchmark
          git clone --branch no-precompiles-v2 --depth 1 \
            https://github.com/powdr-labs/openvm-reth-benchmark.git \
            /tmp/openvm-reth-benchmark

      - name: Set up RISC-V benchmark environment
        if: matrix.backend == 'gpu'
        run: |
          # Nightly toolchain required by openvm-reth-benchmark (via its rust-toolchain.toml)
          rustup install nightly-2025-08-19
          rustup +nightly-2025-08-19 component add rust-src
          # cargo-openvm for guest build
          cargo install cargo-openvm --git https://github.com/powdr-labs/openvm.git --tag v1.4.2-powdr-rc.3 --locked
          # .env with RPC endpoint for rpc-cache
          echo "RPC_1=${{ secrets.RPC_1 }}" > /tmp/openvm-reth-benchmark/.env
          # KZG params dir (not used for compile/prove-stark, but run.sh passes it)
          mkdir -p ~/.openvm/params

      - name: Run reth benchmarks
        if: matrix.backend == 'gpu'
        run: |
          bash scripts/run_reth_benches.sh ${{ matrix.cuda_flag }} \
            --block-number 24171384 \
            --reth-bench-dir /tmp/openvm-reth-benchmark
        env:
          POWDR_OPENVM_SEGMENT_DELTA: "50000"

      - name: Post results to job summary
        if: always()
        run: python3 scripts/render_summary.py results/*/ >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ matrix.backend }}
          path: results/
