name: Nightly Benchmark

on:
  schedule:
    - cron: '0 2 * * *' # 2 AM UTC daily
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  benchmark:
    name: Keccak Benchmark (${{ matrix.backend }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: cpu
            runner: warp-ubuntu-2404-x64-16x
            cuda_flag: ""
            cargo_features: ""
          - backend: gpu
            runner: [self-hosted, gpu-shared]
            cuda_flag: "--cuda"
            cargo_features: "--features cuda"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}

      - name: Install system dependencies
        if: matrix.backend == 'cpu'
        run: sudo apt-get update && sudo apt-get install -y wabt

      - name: Install Rust toolchain 1.91.0 (stable)
        run: |
          rustup install 1.91.0
          rustup +1.91.0 component add rust-src

      - name: Install WebAssembly target
        run: rustup target add wasm32-unknown-unknown

      - name: Check GPU memory
        if: matrix.backend == 'gpu'
        run: |
          FREE_MB=$(nvidia-smi --query-gpu=memory.free --format=csv,noheader,nounits)
          echo "Free GPU memory: ${FREE_MB} MiB"
          if [ "$FREE_MB" -lt 16000 ]; then
            echo "ERROR: Less than 16GB GPU memory free. Check for other GPU processes:"
            nvidia-smi
            exit 1
          fi

      - name: Build project
        run: cargo build --release ${{ matrix.cargo_features }}

      - name: Build keccak WASM target
        run: |
          cd sample-programs/keccak_with_inputs
          cargo build --release --target wasm32-unknown-unknown

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run benchmarks
        run: bash scripts/run_guest_benches.sh ${{ matrix.cuda_flag }}

      - name: Post results to job summary
        if: always()
        run: python3 scripts/render_summary.py results/keccak_* >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ matrix.backend }}
          path: results/
